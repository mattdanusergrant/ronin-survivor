name: Smoke test

# Runs the dependency-free headless smoke test (test/smoke.js) on every push
# and PR so a broken build can't silently reach `main` (and from there, Pages).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run smoke test
        run: node test/smoke.js
